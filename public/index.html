<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <title>MATRIX | Steam Hub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <div class="nav-left">
                <button id="tab-btn-dash" class="nav-tab active" onclick="switchTab('dash')">账号枢纽</button>
                <button id="tab-btn-manage" class="nav-tab" style="display:none;" onclick="switchTab('manage')">账号管理 (Admin)</button>
            </div>
            <div class="nav-right">
                <button id="add-account-btn" class="btn" style="display:none;" onclick="openAddModal()">+ 接入账号</button>
                <button id="admin-entrance" class="btn" onclick="triggerAdminLogin()">管理员登录</button>
                <button id="site-logout-btn" class="btn btn-site-logout" onclick="logoutSite()">退出账号</button>
            </div>
        </header>

        <div id="view-dash">
            <div class="filter-group">
                <button id="filter-绿色" class="filter-btn active" onclick="setFilter('绿色')">完美绿色</button>
                <button id="filter-老兵" class="filter-btn" onclick="setFilter('老兵')">完美老兵</button>
                <button id="filter-5E" class="filter-btn" onclick="setFilter('5E')">5E 竞技平台</button>
            </div>
            <div id="account-list"></div>
        </div>

        <div id="view-manage" style="display:none;">
            <div class="card" style="margin-top: 20px;">
                <h3 style="margin-top:0; color: var(--accent);">🛠️ 在线装甲锻造车间 (Web Forge)</h3>
                <p style="color: #64748b; font-size: 0.9em;">在此粘贴号商提供的 Raw 文本，一键传输至星舰核心。</p>
                <textarea id="web-raw-data" rows="5" style="width: 100%; background: #0f172a; color: #10b981; border: 1px solid #334155; border-radius: 6px; padding: 10px; font-family: monospace;" placeholder="格式: Steam账号----Steam密码..."></textarea>
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="startWebArmor()">⚡ 注入数据并准备锻造</button>
                <div id="forge-terminal" style="margin-top: 15px; background: #000; padding: 15px; border-radius: 6px; border: 1px solid #334155; font-family: monospace; font-size: 0.85em; color: #e2e8f0; display: none;"></div>
            </div>
            
            <div class="card" style="padding:0; border:none; margin-top: 20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px;">
                    <h3 style="margin:0;">🛡️ 矩阵密钥阵列</h3>
                    <span style="font-size:0.9em; color:var(--danger);">刷新倒计时: <span id="timer">--</span>s</span>
                </div>
                <table>
                    <thead><tr><th>Steam 账号</th><th>密码</th><th>平台归属</th><th>当前动态密钥 (30s)</th><th>操作</th></tr></thead>
                    <tbody id="manage-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay"><div class="modal"><h3 style="margin-top:0;">系统鉴权</h3><input type="password" id="auth-pass" placeholder="输入 MATRIX 访问密钥"><button class="btn" style="width:100%; margin-top:15px;" onclick="performLogin()">验证</button><button class="btn" style="width:100%; background:transparent; border:1px solid #334155; margin-top:10px;" onclick="closeModals()">取消</button></div></div>
    <div id="add-modal" class="modal-overlay"><div class="modal"><h3 id="modal-title" style="margin-top:0;">接入新账号</h3><div id="step1"><input type="text" id="new-user" placeholder="Steam 账号"><input type="text" id="new-pass" placeholder="Steam 密码 (将作为提取令牌的钥匙)"><input type="text" id="new-secret" placeholder="Shared Secret (形如 M9#xK...=)"><select id="new-type"><option value="绿色">完美绿色</option><option value="老兵">完美老兵</option><option value="5E">5E 对战平台</option></select><button class="btn" style="width:100%; margin-top:15px; background:var(--success);" onclick="submitDirectAdd()">直接写入矩阵</button></div><button class="btn" style="width:100%; background:transparent; border:1px solid #334155; margin-top:10px;" onclick="closeModals()">取消</button></div></div>
    <script src="/js/app.js"></script>
</body>
</html>
